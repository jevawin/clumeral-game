<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clumeral</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Inconsolata:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#f5edd8" />
    <meta name="description" content="Work out the number from 100–999. New puzzle every day." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clumeral.com/" />
    <meta property="og:title" content="Clumeral" />
    <meta property="og:description" content="Work out the number from 100–999. New puzzle every day." />
    <meta property="og:image" content="https://clumeral.com/og-image.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clumeral" />
    <meta name="twitter:description" content="Work out the number from 100–999. New puzzle every day." />
    <meta name="twitter:image" content="https://clumeral.com/og-image.png" />

    <link rel="icon" type="image/png" href="/icons/lime/dark/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/tailwind.css" />
    <script>
      (function () {
        var t = localStorage.getItem("dlng_theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.classList.add(t);
      })();
    </script>
  </head>
  <body>
    <a href="#game-content" class="skip-link">Skip to puzzle</a>
    <div class="min-h-screen bg-bg">
      <!-- ── Feedback modal ── -->
      <dialog data-fb-modal aria-labelledby="cw-fb-modal-title">
        <div data-fb-modal-box
             class="relative w-full max-w-[26rem] max-h-[90vh] overflow-y-auto rounded-md bg-surface shadow-[0_8px_40px_rgba(26,24,48,0.18)] dark:shadow-[0_8px_40px_rgba(0,0,0,0.5)] pt-7 px-6 pb-6">
          <button data-fb-modal-close
                  class="absolute top-4 right-4 min-w-[44px] min-h-[44px] flex items-center justify-center bg-transparent border-none text-text/50 hover:text-text text-xl leading-none cursor-pointer"
                  type="button" aria-label="Close feedback modal">&#10005;</button>
          <h2 id="cw-fb-modal-title" class="text-[26px] font-semibold leading-[1.2] text-text font-[Quicksand] m-0">Send feedback</h2>
          <p class="text-muted text-base font-[Quicksand] mt-1 mb-3">Let us know what you think.</p>

          <div data-fb-cats role="radiogroup" aria-label="Feedback category" class="flex flex-wrap gap-2 mb-3">
            <button class="fb-cat rounded-full border-[1.5px] border-border bg-surface text-text px-4 py-2 text-base font-[Quicksand] cursor-pointer transition-[background-color,color,border-color] duration-150"
                    data-cat="general" role="radio" aria-checked="true">General</button>
            <button class="fb-cat rounded-full border-[1.5px] border-border bg-surface text-text px-4 py-2 text-base font-[Quicksand] cursor-pointer transition-[background-color,color,border-color] duration-150"
                    data-cat="bug" role="radio" aria-checked="false">Bug</button>
            <button class="fb-cat rounded-full border-[1.5px] border-border bg-surface text-text px-4 py-2 text-base font-[Quicksand] cursor-pointer transition-[background-color,color,border-color] duration-150"
                    data-cat="suggestion" role="radio" aria-checked="false">Idea</button>
            <button class="fb-cat rounded-full border-[1.5px] border-border bg-surface text-text px-4 py-2 text-base font-[Quicksand] cursor-pointer transition-[background-color,color,border-color] duration-150"
                    data-cat="praise" role="radio" aria-checked="false">Praise</button>
          </div>

          <label for="cw-fb-msg" class="sr-only">Your feedback message</label>
          <textarea id="cw-fb-msg" data-fb-msg maxlength="500" rows="4"
                    placeholder="Your message..."
                    class="w-full min-h-[96px] max-h-[192px] resize-y border-[1.5px] border-border bg-surface text-text placeholder:text-muted p-3 rounded-[4px] font-[Quicksand] text-base leading-relaxed focus:border-accent focus:outline-none transition-[border-color] duration-150"></textarea>
          <div data-fb-counter class="hidden w-full text-right font-[Inconsolata,monospace] text-base text-muted mt-1"></div>

          <p class="text-muted text-base font-[Quicksand] mt-3 mb-2">This info will be sent with your feedback:</p>
          <div data-fb-meta class="font-[Inconsolata,monospace] text-base leading-[1.6] text-muted bg-[rgba(10,133,10,0.08)] dark:bg-[rgba(30,173,82,0.1)] p-2 px-3 rounded-[4px]"></div>

          <button data-fb-send
                  class="w-full h-12 mt-3 bg-accent text-white text-base font-semibold tracking-[0.04em] font-[Quicksand] border-none rounded-[3px] shadow-[3px_3px_0_rgba(38,38,36,0.25)] cursor-pointer active:translate-y-0.5 active:translate-x-0.5 active:shadow-none disabled:opacity-50 disabled:cursor-not-allowed transition-[transform,box-shadow] duration-75">Send feedback</button>
        </div>
      </dialog>


      <main class="max-w-[390px] mx-auto px-4">
        <!-- ── Header row: octo + title ── -->
        <header class="flex items-center gap-3.5 mb-2.5">
          <div data-octo-slot>
          <div data-octo-wrap title="click to replay" aria-hidden="true">
            <svg data-octo width="53" height="52" viewBox="0 0 53 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <mask id="octo-mask" fill="white">
                <path
                  d="M53 48C53 50.2091 51.2091 52 49 52H48C45.7909 52 44 50.2091 44 48V41H42V48C42 50.2091 40.2091 52 38 52H37C34.7909 52 33 50.2091 33 48V41H31V48C31 50.2091 29.2091 52 27 52H26C23.7909 52 22 50.2091 22 48V41H20V48C20 50.2091 18.2091 52 16 52H15C12.7909 52 11 50.2091 11 48V41H9V48C9 50.2091 7.20914 52 5 52H4C1.79086 52 6.44266e-08 50.2091 0 48V15C1.9329e-07 6.71573 6.71573 0 15 0H38C46.2843 5.47619e-07 53 6.71573 53 15V48Z"
                />
              </mask>
              <path
                d="M53 48C53 50.2091 51.2091 52 49 52H48C45.7909 52 44 50.2091 44 48V41H42V48C42 50.2091 40.2091 52 38 52H37C34.7909 52 33 50.2091 33 48V41H31V48C31 50.2091 29.2091 52 27 52H26C23.7909 52 22 50.2091 22 48V41H20V48C20 50.2091 18.2091 52 16 52H15C12.7909 52 11 50.2091 11 48V41H9V48C9 50.2091 7.20914 52 5 52H4C1.79086 52 6.44266e-08 50.2091 0 48V15C1.9329e-07 6.71573 6.71573 0 15 0H38C46.2843 5.47619e-07 53 6.71573 53 15V48Z"
                fill="var(--color-accent)"
              />
              <path
                d="M53 48H54V48H53ZM49 52V53V52ZM44 48H43V48H44ZM44 41H45V40H44V41ZM42 41V40H41V41H42ZM42 48H43V48H42ZM38 52V53V52ZM33 48H32V48H33ZM33 41H34V40H33V41ZM31 41V40H30V41H31ZM31 48H32V48H31ZM27 52V53V52ZM22 48H21V48H22ZM22 41H23V40H22V41ZM20 41V40H19V41H20ZM20 48H21V48H20ZM16 52V53V52ZM11 48H10V48H11ZM11 41H12V40H11V41ZM9 41V40H8V41H9ZM9 48H10V48H9ZM5 52V53V52ZM0 48H-1V48H0ZM0 15H-1V15H0ZM38 0V-1V-1V0ZM53 15H54V15H53ZM53 48H52C52 49.6569 50.6569 51 49 51V52V53C51.7614 53 54 50.7614 54 48H53ZM49 52V51H48V52V53H49V52ZM48 52V51C46.3431 51 45 49.6569 45 48H44H43C43 50.7614 45.2386 53 48 53V52ZM44 48H45V41H44H43V48H44ZM44 41V40H42V41V42H44V41ZM42 41H41V48H42H43V41H42ZM42 48H41C41 49.6569 39.6569 51 38 51V52V53C40.7614 53 43 50.7614 43 48H42ZM38 52V51H37V52V53H38V52ZM37 52V51C35.3431 51 34 49.6569 34 48H33H32C32 50.7614 34.2386 53 37 53V52ZM33 48H34V41H33H32V48H33ZM33 41V40H31V41V42H33V41ZM31 41H30V48H31H32V41H31ZM31 48H30C30 49.6569 28.6569 51 27 51V52V53C29.7614 53 32 50.7614 32 48H31ZM27 52V51H26V52V53H27V52ZM26 52V51C24.3431 51 23 49.6569 23 48H22H21C21 50.7614 23.2386 53 26 53V52ZM22 48H23V41H22H21V48H22ZM22 41V40H20V41V42H22V41ZM20 41H19V48H20H21V41H20ZM20 48H19C19 49.6569 17.6569 51 16 51V52V53C18.7614 53 21 50.7614 21 48H20ZM16 52V51H15V52V53H16V52ZM15 52V51C13.3431 51 12 49.6569 12 48H11H10C10 50.7614 12.2386 53 15 53V52ZM11 48H12V41H11H10V48H11ZM11 41V40H9V41V42H11V41ZM9 41H8V48H9H10V41H9ZM9 48H8C8 49.6569 6.65685 51 5 51V52V53C7.76142 53 10 50.7614 10 48H9ZM5 52V51H4V52V53H5V52ZM4 52V51C2.34315 51 1 49.6569 1 48H0H-1C-1 50.7614 1.23858 53 4 53V52ZM0 48H1V15H0H-1V48H0ZM0 15H1C1 7.26801 7.26801 1 15 1V0V-1C6.16344 -1 -1 6.16344 -1 15H0ZM15 0V1H38V0V-1H15V0ZM38 0V1C45.732 1 52 7.26801 52 15H53H54C54 6.16344 46.8366 -0.999999 38 -1V0ZM53 15H52V48H53H54V15H53Z"
                fill="#F6F0E8"
                mask="url(#octo-mask)"
              />
              <!-- Round eyes -->
              <circle data-eye="l-round" cx="19" cy="15" r="2.5" fill="#F6F0E8" />
              <circle data-eye="r-round" cx="33" cy="15" r="2.5" fill="#F6F0E8" />
              <!-- Squint eyes -->
              <path data-eye="l-squint" d="M22 15H16C16 15 16 18 19 18C22 18 22 15 22 15Z" fill="#F6F0E8" opacity="0" />
              <path data-eye="r-squint" d="M36 15H30C30 15 30 18 33 18C36 18 36 15 36 15Z" fill="#F6F0E8" opacity="0" />
              <!-- X eyes -->
              <g data-eye="l-x" opacity="0">
                <path d="M16 12 L22 18" stroke="#F6F0E8" stroke-width="1.8" stroke-linecap="round" />
                <path d="M22 12 L16 18" stroke="#F6F0E8" stroke-width="1.8" stroke-linecap="round" />
              </g>
              <g data-eye="r-x" opacity="0">
                <path d="M30 12 L36 18" stroke="#F6F0E8" stroke-width="1.8" stroke-linecap="round" />
                <path d="M36 12 L30 18" stroke="#F6F0E8" stroke-width="1.8" stroke-linecap="round" />
              </g>
              <!-- Happy mouth -->
              <g data-mouth="happy">
                <path d="M21 26C24.3333 27.3333 27.6667 27.3333 31 26" stroke="#F6F0E8" stroke-width="1.5" stroke-linecap="round" />
              </g>
              <!-- Squint mouth -->
              <g data-mouth="squint" opacity="0">
                <path d="M21 26C24.3333 27.3333 27.6667 27.3333 31 26" stroke="#F6F0E8" stroke-width="1.5" stroke-linecap="round" />
              </g>
              <!-- Sad mouth -->
              <g data-mouth="sad" opacity="0">
                <path d="M21 29C24.3333 27.5 27.6667 27.5 31 29" stroke="#F6F0E8" stroke-width="1.5" stroke-linecap="round" />
              </g>
            </svg>
          </div>
          </div>
        </header>

      </main>

      <div data-toast aria-live="polite" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] flex flex-col items-center gap-2 pointer-events-none"></div>
    </div>

    <!-- ── New screen architecture (Phase 1) ── -->
    <main data-screens class="fixed inset-0 z-10 pointer-events-none">
      <section data-screen="welcome" class="absolute inset-0 flex items-center justify-center bg-bg opacity-0 pointer-events-none transition-opacity duration-[250ms] ease-in-out" aria-hidden="true">
        <!-- Phase 2 content -->
      </section>
      <section data-screen="game" class="absolute inset-0 flex flex-col bg-bg opacity-0 pointer-events-none transition-opacity duration-[250ms] ease-in-out" aria-hidden="true">

        <!-- ── Game header ── -->
        <header data-game-header class="h-14 sticky top-0 z-30 flex items-center justify-between px-4 bg-bg border-b border-border">
          <div class="flex items-center gap-2">
            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 53 52" fill="none" class="shrink-0">
              <path d="M53 48C53 50.2091 51.2091 52 49 52H48C45.7909 52 44 50.2091 44 48V41H42V48C42 50.2091 40.2091 52 38 52H37C34.7909 52 33 50.2091 33 48V41H31V48C31 50.2091 29.2091 52 27 52H26C23.7909 52 22 50.2091 22 48V41H20V48C20 50.2091 18.2091 52 16 52H15C12.7909 52 11 50.2091 11 48V41H9V48C9 50.2091 7.20914 52 5 52H4C1.79086 52 6.44266e-08 50.2091 0 48V15C1.9329e-07 6.71573 6.71573 0 15 0H38C46.2843 5.47619e-07 53 6.71573 53 15V48Z" fill="var(--color-accent)"/>
              <circle cx="19" cy="15" r="2.5" fill="#F6F0E8"/>
              <circle cx="33" cy="15" r="2.5" fill="#F6F0E8"/>
              <path d="M21 26C24.3333 27.3333 27.6667 27.3333 31 26" stroke="#F6F0E8" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="text-xl font-bold text-text font-[Comfortaa]">Clumeral</span>
          </div>
          <button data-menu-btn class="burger-btn relative h-10 w-10 flex items-center justify-center text-text" type="button" aria-expanded="false" aria-controls="game-menu" aria-label="Open menu">
            <span aria-hidden="true" class="burger-bar"></span>
            <span aria-hidden="true" class="burger-bar"></span>
          </button>
        </header>

        <!-- ── Menu dropdown ── -->
        <div id="game-menu" data-menu role="dialog" aria-label="Game menu"
             class="hidden absolute top-14 right-0 z-40 min-w-[200px] py-2 bg-surface border border-border rounded-lg shadow-lg">
          <button data-theme-toggle class="flex items-center gap-3 px-4 py-3 w-full text-left text-base text-text hover:bg-bg font-[Quicksand]" type="button">
            <svg width="20" height="20" class="text-muted" aria-hidden="true"><use href="/sprites.svg#icon-moon"/></svg>
            <span data-theme-label>Dark mode</span>
          </button>
          <a href="/puzzles" class="flex items-center gap-3 px-4 py-3 w-full text-base text-text hover:bg-bg no-underline font-[Quicksand]">
            <svg width="20" height="20" class="text-muted" aria-hidden="true"><use href="/sprites.svg#icon-archive"/></svg>
            Archive
          </a>
          <button data-fb-btn class="flex items-center gap-3 px-4 py-3 w-full text-left text-base text-text hover:bg-bg font-[Quicksand]" type="button">
            <svg width="20" height="20" class="text-muted" aria-hidden="true"><use href="/sprites.svg#icon-feedback"/></svg>
            Feedback
          </button>
          <button data-htp-btn class="flex items-center gap-3 px-4 py-3 w-full text-left text-base text-text hover:bg-bg font-[Quicksand]" type="button">
            <svg width="20" height="20" class="text-muted" aria-hidden="true"><use href="/sprites.svg#icon-help"/></svg>
            How to play
          </button>
        </div>

        <!-- ── Scrollable content ── -->
        <div id="game-content" data-game-content class="flex-1 overflow-y-auto px-4 pt-8 pb-24">
          <div class="w-full max-w-[390px] mx-auto flex flex-col">

            <!-- Clue list (skeletons replaced by renderClues) -->
            <div data-clue-list role="list" aria-label="Puzzle clues" aria-busy="true"
                 class="[display:grid] [grid-template-columns:max-content_1fr] gap-x-4 gap-y-4 items-center">
              <div class="clue-skeleton contents" aria-hidden="true">
                <div class="w-16 h-8 rounded bg-surface animate-pulse"></div>
                <div class="flex flex-col gap-2">
                  <div class="h-4 w-4/5 rounded bg-surface animate-pulse"></div>
                  <div class="h-4 w-2/5 rounded bg-surface animate-pulse"></div>
                </div>
              </div>
              <div class="clue-skeleton contents" aria-hidden="true">
                <div class="w-16 h-8 rounded bg-surface animate-pulse"></div>
                <div class="flex flex-col gap-2">
                  <div class="h-4 w-4/5 rounded bg-surface animate-pulse"></div>
                  <div class="h-4 w-2/5 rounded bg-surface animate-pulse"></div>
                </div>
              </div>
              <div class="clue-skeleton contents" aria-hidden="true">
                <div class="w-16 h-8 rounded bg-surface animate-pulse"></div>
                <div class="flex flex-col gap-2">
                  <div class="h-4 w-4/5 rounded bg-surface animate-pulse"></div>
                  <div class="h-4 w-2/5 rounded bg-surface animate-pulse"></div>
                </div>
              </div>
            </div>

            <!-- Digit boxes -->
            <div data-digits class="flex gap-2 w-full mt-2" role="group" aria-label="Digit entry boxes">
              <div class="flex-1 aspect-square [container-type:inline-size] flex items-center justify-center bg-surface border-[1.5px] border-border rounded shadow-[3px_3px_0_rgba(38,38,36,0.12)] dark:shadow-[3px_3px_0_rgba(0,0,0,0.25)] cursor-pointer" data-digit="0" role="button" tabindex="0" aria-label="Hundreds digit" aria-expanded="false"></div>
              <div class="flex-1 aspect-square [container-type:inline-size] flex items-center justify-center bg-surface border-[1.5px] border-border rounded shadow-[3px_3px_0_rgba(38,38,36,0.12)] dark:shadow-[3px_3px_0_rgba(0,0,0,0.25)] cursor-pointer" data-digit="1" role="button" tabindex="0" aria-label="Tens digit" aria-expanded="false"></div>
              <div class="flex-1 aspect-square [container-type:inline-size] flex items-center justify-center bg-surface border-[1.5px] border-border rounded shadow-[3px_3px_0_rgba(38,38,36,0.12)] dark:shadow-[3px_3px_0_rgba(0,0,0,0.25)] cursor-pointer" data-digit="2" role="button" tabindex="0" aria-label="Units digit" aria-expanded="false"></div>
            </div>

            <!-- Keypad -->
            <div data-keypad-wrap class="w-full mt-2 hidden">
              <div data-keypad class="grid grid-cols-5 gap-2 w-full"></div>
            </div>

            <!-- Submit -->
            <div data-submit-wrap class="w-full mt-4 hidden">
              <button data-submit class="w-full h-14 rounded-sm bg-accent text-white text-base font-bold tracking-wide font-[Quicksand] shadow-[3px_3px_0_rgba(38,38,36,0.18)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none" type="button">Check my guess</button>
            </div>

            <!-- Save score row — visible when submit-wrap sibling is shown (CSS rule in tailwind.css) -->
            <div data-save class="items-center gap-1.5 mt-3.5 text-base text-muted font-[Quicksand]">
              <input type="checkbox" checked id="cw-ck" data-save-check />
              <label for="cw-ck" class="flex items-center gap-1.5 cursor-pointer">
                <svg class="ck-on" width="16" height="16" aria-hidden="true"><use href="/sprites.svg#icon-check"/></svg>
                <svg class="ck-off" width="16" height="16" aria-hidden="true"><use href="/sprites.svg#icon-uncheck"/></svg>
                Keep my score in a
                <svg class="inline" width="13" height="13" aria-hidden="true"><use href="/sprites.svg#icon-cookie"/></svg>
                cookie
              </label>
            </div>

            <!-- Feedback -->
            <p data-feedback class="text-base font-bold leading-snug mt-4 hidden font-[Quicksand]" aria-live="assertive"></p>

            <!-- Guess history -->
            <div data-history class="hidden mt-4">
              <p class="font-mono text-base font-bold uppercase tracking-widest text-muted mb-2">Your guesses</p>
              <ul data-history-list class="flex flex-wrap gap-2 list-none p-0 m-0"></ul>
            </div>

            <!-- Stats -->
            <div data-stats class="hidden mt-4"></div>

            <!-- Next puzzle -->
            <p data-next class="hidden mt-4 text-base text-muted font-[Quicksand]">
              Puzzle <span data-next-number></span> is available tomorrow.
            </p>

            <!-- Random again -->
            <p data-again class="hidden mt-4 text-base font-[Quicksand]">
              <a href="/random" class="text-accent underline">Play another random puzzle</a>
            </p>

          </div>
        </div>

      </section>
      <section data-screen="completion" class="absolute inset-0 flex items-center justify-center bg-bg opacity-0 pointer-events-none transition-opacity duration-[250ms] ease-in-out" aria-hidden="true">
        <div class="max-w-[390px] mx-auto px-4 pt-12 pb-8 text-center">
          <h2 data-completion-heading class="text-xl font-bold text-text"></h2>
          <p data-completion-subheading class="text-base text-muted mt-1"></p>

          <div data-completion-stats class="grid grid-cols-2 gap-4 mt-6">
            <!-- Stats rendered by completion.ts -->
          </div>

          <p data-completion-countdown class="text-base text-muted mt-8"></p>

          <button data-completion-feedback type="button"
            class="mt-6 w-full bg-accent text-white font-semibold text-base py-3 px-6 rounded-md min-h-[44px]">
            Leave feedback
          </button>
        </div>
      </section>
    </main>

    <footer data-footer class="fixed bottom-0 left-0 right-0 z-20 text-center py-4 text-muted text-sm font-[Quicksand]">
      Made with &#10084;&#65039; by Jamie &amp; Dave. &copy; 2026.
    </footer>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
